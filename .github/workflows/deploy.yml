name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10203
          script: |
            set -e
            cd ~/alfred
            git checkout -- . 2>/dev/null || true
            git clean -f apps/server/.mcp-servers.json 2>/dev/null || true
            git pull origin master
            npm install

            # MCP server dependencies
            cd mcp/youtube && npm ci && cd ../..
            cd mcp/firecrawl && npm ci && cd ../..

            # Build client
            npm run build --workspace @wonderlands/client

            # Reload all processes
            pm2 reload ecosystem.config.cjs --update-env

            # Ensure kernel container is running
            docker compose -f docker-compose.kernel.yml up -d
